<div class="uws-cart-item uws-cart-item-{mastercode} uws-integration" data-mastercode="{mastercode}">
    <div class="uwsinfo">
        <div class="uwsname">{itemname}</div>
        <div class="uwsguests">{itemcartguests}</div>
        <div class="uwsextrainfo">{itemcarttimeinfo}</div>
    </div>
    <div class="uwspricecont">
        {itempicingdiv}
        <div class="uwsprice" data-symbol="{cartitemcurrencysymbol}">{itemcartprice}</div> 
    </div>
    <div class="uwsactions">
        <a href="#remove-item-from-cart-{mastercode}" aria-label="Remove Item From Cart" class="uwsjs-removecartitem" data-itemcartcode="{itemcartcode}"><span>Remove</span><i class="uwsicon-trash"></i></a>
    </div>
</div>
