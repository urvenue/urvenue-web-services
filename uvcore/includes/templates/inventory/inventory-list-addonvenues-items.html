<div class="uws-inv-item-{venuecode} uws-globaltype-{globaltype} uws-inventory-item uwsinv-item">
    <a class="uwsjs-select-invlist-venue uwsinvitem-venue" href='#uvinv-select-invlist-venue-{venuecode}'
        data-itemtype="addonvenue" data-globaltype="{globaltype}" data-venuecode="{venuecode}"
        data-microcode="{microcode}" data-date="{date}" data-mixecozones="0" data-managementid="{managementid}"
        data-addonvenues="1">
        {venuelogo}
        <div class="uwsinfo">
            <div class="uwsname">{venuename}</div>
            <div class="uwsaddress">{venueaddress}</div>
            {venueinfodiv}
        </div>
        <i class="uwsicon-right-open"></i>
    </a>
</div>
