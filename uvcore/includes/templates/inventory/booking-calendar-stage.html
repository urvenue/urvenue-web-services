<div class="uws-booking-calendar uws-integration {bkcalclass}" data-venuecode="{venuecode}" data-mindate="{mindate}"
    data-date="{date}" data-ecozone="{ecozone}" data-maxdate="{maxdate}">
    <div class="uws-booking-calendar-date">
        <div class="uvtitle">Select a Date</div>
        <div class="uws-bookingcal-dpcont">
            <div class="uws-loader-uvicon"></div>
            <div class="uwsjs-booking-calendar-dp uws-litepickerlarge">
            </div>
        </div>
        <div class="uwsactions">
            <a href="#uws-book-selected-date" class="uws-btn uws-btn-p uwsjs-bkcal-bookdate"><span>Book Now</span></a>
        </div>
    </div>
    <div class="uws-booking-calendar-book">
        <div class="uvtitle">Booking</div>
        <div class='uwsbookingcalinvcont uwsjs-loadeventinventory uws-event-inventory' data-eventcode='{eventcode}'>
            <div class='uws-integration uws-inventory-stage uwsdy-cartactive-class uws-inventory-stage-1 uwsloading'
                data-instance='1'>
                <div class='uws-inventoryloader'>
                    <div class='uwsloadingmsg'>
                        <div class='uws-loader-uvicon'></div>
                        <div class='uwsloadingtxt'>Loading Experiences...</div>
                    </div>
                    <div class='uwsloadingbkt'></div>
                    <div class='uwsloadingbitem'></div>
                    <div class='uwsloadingbitem'></div>
                    <div class='uwsloadingbkt'></div>
                </div>
                <div class='uws-inventory-load'></div>
            </div>
        </div>
    </div>
</div>
