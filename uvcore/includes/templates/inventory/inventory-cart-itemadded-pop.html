<div class="uws-cart-itemadded uwsviewshown">
    <div class="uwscartscreenbody">
        <i class="uwsicon-shop"></i>
        <div class="uwstitle">Item Added to Cart!</div>
        <div class="uwstext">Continue shopping or checkout now.</div>
        <div class="uwsactions">
            <a href="{carturl}" class="uws-btn uws-btn-s uwsjs-go-cart"><span>View Cart</span></a>
        </div>
    </div>
    <div class="uwscartscreenfooter">
        <div class="uwsactions">
            <button class="uws-btn uws-btn-p uwsjs-closepop-force"><span>Continue Shopping</span></button>
            <a href="{checkouturl}" class="uws-btn uws-btn-s"><span>Checkout</span></a>
        </div>
    </div>
</div>
