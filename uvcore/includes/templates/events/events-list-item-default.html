<div class="uws-event-list-item {performersclass}">
    <a href="{eventlink}" aria-label="{eventname} {buttonlabel}">
        <div class="uws-list-item-default uws-event-item">
            <div class="uwsflyercont uws-ratio-{eventflyer-list-ratio}"><img class="uwsimgloading"
                    src="{eventflyer-list}" alt="{eventname} - Flyer" onload="this.classList.add('uwsloaded')"></div>
            <div class="uwsdedate">
                <div class="uwsdsday">{eventdsday}</div>
                <div class="uwsdday">{eventdday}</div>
                <div class="uwsdsmonth">{eventdsmonth}</div>
            </div>
            <div class="uwsinfo">
                <div class="uwsddate">{eventddate}</div>
                <div class="uwsname">{eventname}</div>
                {eventvenuediv}
            </div>
            {eventvenuediv}
            <div class="uwsactions">
                <span class="uws-btn uws-btn-s">{buttonspanlabel}</span>
            </div>
        </div>
    </a>
</div>
