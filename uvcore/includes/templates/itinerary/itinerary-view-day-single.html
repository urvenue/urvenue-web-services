<div class="uwsdayviewrow {dayviewclass}">
    <div class="uwsheader">
        <div class="uwsinfo">
            <div class="uwspretitle">{itdday}</div>
            <div class="uwstitle">{itddate}</div>
        </div>
        <div class="uwsactions">
            <a href="{experiencesurl}" class="uws-btn uws-btn-p uwsaddexpbtn"><i class="uwsicon-plus-1"></i> <span>Add Experience</span></a>
            {iflastbookdate}<a href="{extendstay}" class="uws-btn uws-btn-p"><i class="uwsicon-calendar-2"></i> <span>Extend Stay</span></a>{/iflastbookdate}
        </div>
    </div>
    <div class="uwsititems">
        {dateititems}
    </div>
</div>
