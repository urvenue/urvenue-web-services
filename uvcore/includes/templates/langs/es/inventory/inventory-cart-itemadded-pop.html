<div class="uws-cart-itemadded uwsviewshown">
    <div class="uwscartscreenbody">
        <i class="uwsicon-shop"></i>
        <div class="uwstitle">¡Agregado al Carrito!</div>
        <div class="uwstext">Continuar explorando o pagar ahora.</div>
        <div class="uwsactions">
            <a href="{carturl}" class="uws-btn uws-btn-s uwsjs-go-cart"><span>Ver Carrito</span></a>
        </div>
    </div>
    <div class="uwscartscreenfooter">
        <div class="uwsactions">
            <button class="uws-btn uws-btn-p uwsjs-closepop-force"><span>Continuar Explorando</span></button>
            <a href="{checkouturl}" class="uws-btn uws-btn-s"><span>Finalizar Compra</span></a>
        </div>
    </div>
</div>
