<div class="uws-inventory-bookbtns">
    <div class="uws-inventory-bookbtns-body">
        <div class="uwsactions">
            <a href="{carturl}"
                class="uws-btn uws-btn-s uwsdy-carturl uwsjs-go-cart {bookbtnsclass}"><span>Carrito</span><span
                    class="uwsdy-cartcount uws-count"></span></a>
            <a href="{checkurl}" class="uws-btn uws-btn-p uwsdy-checkouturl {bookbtnsclass}"><i
                    class="uwsicon-basket"></i><span>Finalizar Compra</span><span
                    class="uwsdy-cartcount uws-count"></span></a>
        </div>
    </div>
</div>
