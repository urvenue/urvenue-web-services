<div class="uws-packages-listitem">
    <a href="#open-item-masteritem-{masteritemcode}" class="uwsjs-openpackage" data-masteritemcode="{masteritemcode}"
        data-globaltype="{globaltype}">
        <div class="uws-packages-agenda-item-default uws-packages-item">
            <div class="uwsflyercont uwshasimage-{hasimage}"><img class="uwsimgloading" src="{imageurl}"
                    alt="{itemname} - Flyer" onload="this.classList.add('uwsloaded')"></div>
            <div class="uwsinfo">
                <div class="uwsinfoinner">
                    <div class="uwsname"><span>{itemname}</span></div>
                    <div class="uwshighlight">{highlight}</div>
                    <div class="uwsdescr">{itemdescr}</div>
                </div>
                <div class="uwsactions">
                    <span class="uws-btn uws-btn-p">Book Now</span>
                </div>
            </div>
        </div>
    </a>
</div>
