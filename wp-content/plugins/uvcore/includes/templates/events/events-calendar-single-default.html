<a href="{eventlink}" class="uws-cal-single-link" aria-label="{eventname} Book Now">
    <div class="uws-cal-single-default">
        <div class="uwsflyercont uws-ratio-{eventflyer-calendar-ratio}"><img class="uwsimgloading" src="{eventflyer-calendar}" alt="{eventname} - Flyer" onload="this.classList.add('uwsloaded'); this.closest('.uws-cal-single-default').classList.add('uwsloaded')"></div>
        <div class="uwsinfo">
            <div class="uwsddate">{eventddate}</div>
            <div class="uwsname">{eventname}</div>
            {eventvenuediv}
        </div>
        <div class="uwsactions">
            <span class="uws-btn uws-btn-s">Book Now</span>
        </div>
    </div>
</a>
