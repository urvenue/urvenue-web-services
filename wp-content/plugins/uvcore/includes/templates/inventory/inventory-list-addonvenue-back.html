<div class='uws-inventory-addonvenues-back'>
    <div class='uws-inventory-addonvenues-back-header'>
        <p class='uws-make-special'>{venuepretitle}</p>
        <h2 class='uws-title'>{venuetitle}</h2>
    </div>
    <div class='uws-invitems-list'>
        <div class='uws-inv-item-{venuecode} uws-globaltype-urvenue uws-inventory-item uwsinv-item'>
            <a class='uwsjs-list-addonvenues-back uws-list-addonvenues-back uwsinvitem-venue'
                href='#uws-addonvenues-back' data-eventcode='{eventcode}'>
                <i class='uwsicon-right-open'></i>
                <div class='uwsvenuelogo'><img decoding='async' class='uwsimgloading uwsloaded' src='{venuelogo}'
                        alt='{venuename} - Logo' onload='this.classList.add("uwsloaded")'></div>
                <div class='uwsinfo'>
                    <div class='uwsname'>{venuename}</div>
                    <div class='uwsaddress'>{venueaddress}</div>
                    <div class='uwsextrainfo'>{venuedescr}</div>
                </div>
            </a>
        </div>
    </div>
</div>
