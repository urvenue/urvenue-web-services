<div class="uws-cart-itemadded uwsviewshown">
    <div class="uwscartscreenbody">
        <i class="uwsicon-shop"></i>
        <div class="uwstitle">カートにアイテムが追加されました！</div>
        <div class="uwstext">買い物を続けるか、今すぐチェックアウトしてください。</div>
        <div class="uwsactions">
            <a href="{carturl}" class="uws-btn uws-btn-s"><span>カートを見る</span></a>
        </div>
    </div>
    <div class="uwscartscreenfooter">
        <div class="uwsactions">
            <button class="uws-btn uws-btn-p uwsjs-closepop-force"><span>買い物を続ける</span></button>
            <a href="{checkouturl}" class="uws-btn uws-btn-s"><span>チェックアウト</span></a>
        </div>
    </div>
</div>
