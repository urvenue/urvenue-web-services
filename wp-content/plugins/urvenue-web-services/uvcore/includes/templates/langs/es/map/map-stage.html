<div class="uws-map-stage">
    <div class="uws-map-list">
        {mapitemslist}
    </div>
    <div class="uws-map-view-cont">
        {uwscredits}
        <div class="uws-map-view">
            <div class="uws-map-zoomcontrols">
                <a href="#uws-map-zoomin" class="uwsjs-map-zoomin" aria-label="Acercar El Mapa"><span>Acercar El Mapa</span> <i
                        class="uwsicon-plus-1"></i></a>
                <a href="#uws-map-zoomout" class="uwsjs-map-zoomout uwsdisabled" aria-label="Alejar El Mapa"><span>Alejar El Mapa</span> <i class="uwsicon-minus-1"></i></a>
            </div>
            <div class="uws-map-graph">
                {mapgraph}
            </div>
            <div class="uws-map-thumbview">
                <svg class='uws-map-thumbview-scope'>
                    <g>
                        <rect class='uwscope' fill='red' fill-opacity='0.1' stroke='red' stroke-width='2px' x='0' y='0'
                            width='0' height='0' />
                        <line class='uwsline1' stroke='red' stroke-width='2px' x1='0' y1='0' x2='0' y2='0' />
                        <line class='uwsline2' stroke='red' stroke-width='2px' x1='0' y1='0' x2='0' y2='0' />
                    </g>
                </svg>
                <div class="uws-map-thumbmap">
                    {mapgraph}
                </div>
            </div>
        </div>
    </div>
</div>
