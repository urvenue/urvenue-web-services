<div class="uws-map-event-info">
    <div class="uwsflyer">
        <a href="{eventflyer-eventpage-full}" class="uwsjs-show-image" data-pop-title="{eventname}" target="_blank"><img
                class="uwsimgloading" src="{eventflyer-eventpage}" alt="{eventname} - Flyer"
                onload="this.classList.add('uwsloaded')"></a>
    </div>
    <div class="uwsname">{eventname}</div>
    <div class="uwsddate">{eventddate}</div>
    <div class="uwsactions">
        <a href="{eventpagelink}" class="uws-btn uws-btn-p uws-btn-100"><span>Detalles del Evento</span></a>
    </div>
</div>
