name: Deploy to WP Engine

on:
  push:
    branches:
      - main
      - staging

jobs:
  production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP lint
        run: find . -name "*.php" -not -path "./node_modules/*" | xargs -n1 php -l
      - name: Deploy to WPE Production
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_PROD_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ vars.WPE_PROD_ENV }}

  staging:
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP lint
        run: find . -name "*.php" -not -path "./node_modules/*" | xargs -n1 php -l
      - name: Deploy to WPE Staging
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_STG_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ vars.WPE_STG_ENV }}
